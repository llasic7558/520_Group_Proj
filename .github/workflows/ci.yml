name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (lint + integration tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: five_college_connect/server

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: five_college_connect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: five_college_connect/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Load schema and seed
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d five_college_connect -f database/schema.sql
          psql -h 127.0.0.1 -U postgres -d five_college_connect -f database/seed.sql

      - name: Write .env for tests
        run: |
          cat > .env <<'EOF'
          PORT=4000
          NODE_ENV=test
          CLIENT_URL=http://localhost:3000
          DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/five_college_connect
          DB_SSL=false
          AUTH_TOKEN_SECRET=ci_test_secret_not_for_production
          AUTH_TOKEN_EXPIRES_IN_HOURS=24
          ALLOWED_EMAIL_DOMAINS=umass.edu,amherst.edu,smith.edu,hampshire.edu,mtholyoke.edu
          EOF

      - name: Run integration tests
        run: npm test

  client:
    name: Client (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: five_college_connect/client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: five_college_connect/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
